<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приветствие Django</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #007BFF;
            outline: none;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
        }

        .greeting-message {
            color: #28a745;
            font-size: 1.2em;
            margin: 20px 0;
            font-weight: bold;
        }

        .history {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .history h3 {
            font-size: 16px;
            color: #666;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Добро пожаловать!</h1>

        {% if last_name %}
            <div class="greeting-message">
                Привет, {{ last_name }}! 
            </div>
        {% endif %}

            <form method="post" action="{% url 'greetings:index' %}">
                {% csrf_token %}
            
            <div class="form-group">
                <input type="text" name="name" placeholder="Введите ваше имя..." required>
            </div>
            
            <button type="submit">Submit</button>
        </form>

        {% if all_names %}
        <div class="history">
            <h3>Недавние имена в базе:</h3>
            <ul>
                {% for user in all_names %}
                <li>{{ user.name }} ({{ user.created_at|date:"H:i" }})</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>

</body>
</html>
