<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик с визуализацией</title>
    <style>
        /* 1. Стилизация интерфейса */
        
        /* Фон страницы - линейный градиент */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* Центровка по горизонтали */
            align-items: center;     /* Центровка по вертикали */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        /* Контейнер для элементов */
        .counter-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 300px;
        }

        /* Окошко результата */
        #result-window {
            font-size: 4rem;
            font-weight: bold;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ccc;
            border-radius: 10px;
            transition: background-color 0.3s ease; /* Плавная смена цвета фона */
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0; /* Дефолтный цвет (нейтральный или красный для 0, меняется в JS) */
        }

        /* Контейнер кнопок */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Стили кнопок */
        button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px; /* Радиальное скругление 5px */
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            /* Градиентный фон кнопок */
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Стиль для неактивной кнопки */
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        /* Окно для экстремального сообщения */
        #extreme-message {
            font-size: 1rem;
            color: #d9534f;
            min-height: 24px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #extreme-message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <h1>Счетчик</h1>
        
        <!-- 1. Окно отображения результата -->
        <div id="result-window">0</div>

        <!-- 1. Кнопки плюса и минуса -->
        <div class="buttons">
            <button id="btn-minus" type="button">-</button>
            <button id="btn-plus" type="button">+</button>
        </div>

        <!-- 5. Окно с надписью об экстремальном значении -->
        <div id="extreme-message">Вы достигли экстремального значения</div>
    </div>

    <script>
        // 2. Реализация логики счетчика

        // Получаем элементы DOM
        const resultWindow = document.getElementById('result-window');
        const btnPlus = document.getElementById('btn-plus');
        const btnMinus = document.getElementById('btn-minus');
        const extremeMessage = document.getElementById('extreme-message');

        // Текущее значение счетчика
        let count = 0;

        // Функция обновления интерфейса
        function updateUI() {
            // Обновляем текст в окошке
            resultWindow.textContent = count;

            // 3. Изменение цвета фона в зависимости от значения
            if (count > 0) {
                resultWindow.style.backgroundColor = '#ffeb3b'; // Желтый
            } else if (count < 0) {
                resultWindow.style.backgroundColor = '#4caf50'; // Зеленый (темнее для контраста текста)
                resultWindow.style.color = '#fff';              // Белый текст для читаемости на зеленом
            } else {
                resultWindow.style.backgroundColor = '#f44336'; // Красный
                resultWindow.style.color = '#fff';              // Белый текст
            }

            // 4. Блокировка кнопок при достижении пределов
            // При достижении 10 кнопка "плюс" неактивна
            if (count >= 10) {
                btnPlus.disabled = true;
            } else {
                btnPlus.disabled = false;
            }

            // При достижении -10 кнопка "минус" неактивна
            if (count <= -10) {
                btnMinus.disabled = true;
            } else {
                btnMinus.disabled = false;
            }

            // 5. Показ/скрытие сообщения об экстремальном значении
            if (count === 10 || count === -10) {
                extremeMessage.classList.add('visible');
            } else {
                extremeMessage.classList.remove('visible');
            }
        }

        // Слушатели событий
        btnPlus.addEventListener('click', function() {
            if (count < 10) { // Дополнительная проверка для защиты от ручного вмешательства, если нужно
                count++;
                updateUI();
            }
        });

        btnMinus.addEventListener('click', function() {
            if (count > -10) {
                count--;
                updateUI();
            }
        });

        // Инициализация первого отображения цветов
        updateUI();
    </script>
</body>
</html>
