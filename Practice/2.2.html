<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик с визуализацией</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center;     
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .counter-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 300px;
        }

        #result-window {
            font-size: 4rem;
            font-weight: bold;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ccc;
            border-radius: 10px;
            transition: background-color 0.3s ease; 
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0; 
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px; 
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        #extreme-message {
            font-size: 1rem;
            color: #d9534f;
            min-height: 24px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #extreme-message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <h1>Счетчик</h1>
        
        <div id="result-window">0</div>

        <div class="buttons">
            <button id="btn-minus" type="button">-</button>
            <button id="btn-plus" type="button">+</button>
        </div>

        <div id="extreme-message">Вы достигли экстремального значения</div>
    </div>

    <script>

        const resultWindow = document.getElementById('result-window');
        const btnPlus = document.getElementById('btn-plus');
        const btnMinus = document.getElementById('btn-minus');
        const extremeMessage = document.getElementById('extreme-message');

        let count = 0;

        function updateUI() {
            resultWindow.textContent = count;

            if (count > 0) {
                resultWindow.style.backgroundColor = '#ffeb3b'; 
            } else if (count < 0) {
                resultWindow.style.backgroundColor = '#4caf50'; 
                resultWindow.style.color = '#fff';              
            } else {
                resultWindow.style.backgroundColor = '#f44336'; 
                resultWindow.style.color = '#fff';              
            }

            
            
            if (count >= 10) {
                btnPlus.disabled = true;
            } else {
                btnPlus.disabled = false;
            }

            if (count <= -10) {
                btnMinus.disabled = true;
            } else {
                btnMinus.disabled = false;
            }

            if (count === 10 || count === -10) {
                extremeMessage.classList.add('visible');
            } else {
                extremeMessage.classList.remove('visible');
            }
        }

        btnPlus.addEventListener('click', function() {
            if (count < 10) { 
                count++;
                updateUI();
            }
        });

        btnMinus.addEventListener('click', function() {
            if (count > -10) {
                count--;
                updateUI();
            }
        });

        // Инициализация первого отображения цветов
        updateUI();
    </script>
</body>
</html>
